<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Topping / Fertiliser GPS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    overflow: hidden;
  }

  #map {
    height: 100%;
    width: 100%;
  }

  #panel {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    z-index: 1000;
    background: rgba(0,0,0,0.78);
    border-radius: 12px;
    padding: 10px;
    box-sizing: border-box;
  }

  .row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  button, input, select {
    font-size: 18px;
    padding: 10px;
    border-radius: 8px;
    border: none;
  }

  button {
    flex: 1;
    font-weight: bold;
    background: #eee;
  }

  button.green { background: #47c95c; }
  button.red { background: #e45b5b; }
  button.blue { background: #66aaff; }
  button.orange { background: #ffb347; }

  input {
    width: 90px;
  }

  #status {
    font-size: 16px;
    line-height: 1.35;
    color: #fff;
  }

  #warn {
    color: #ffd46b;
    font-weight: bold;
  }

  .small {
    font-size: 14px;
    opacity: 0.9;
  }
</style>
</head>

<body>
<div id="map"></div>

<div id="panel">
  <div class="row">
    <button class="green" onclick="startGps()">START GPS</button>
    <button class="red" onclick="stopGps()">STOP</button>
  </div>

  <div class="row">
    <button class="blue" onclick="resumeJob()">RESUME</button>
    <button class="orange" onclick="clearJob()">CLEAR</button>
  </div>

  <div class="row">
    <button onclick="markBoundary()">MARK BOUNDARY</button>
    <button onclick="finishBoundary()">FINISH FIELD</button>
  </div>

  <div class="row">
    <label>Width m:
      <input id="width" type="number" value="10" step="0.5" min="0.5" onchange="saveSettings()">
    </label>
    <button onclick="toggleMap()">MAP/SAT</button>
  </div>

  <div id="status">
    Status: ready<br>
    Accuracy: -<br>
    Points: 0<br>
    Saved: no
  </div>
  <div id="warn" class="small"></div>
</div>

<script>
let map;
let normalLayer, satelliteLayer, currentLayer;
let watchId = null;
let currentMarker = null;
let trackLine = null;
let coverageLine = null;
let boundaryLine = null;
let boundaryPolygon = null;
let track = [];
let boundary = [];
let lastPosition = null;
let running = false;
let wakeLock = null;

const STORAGE_KEY = "topping_fertiliser_gps_job_v1";

function initMap() {
  map = L.map("map", {
    zoomControl: false
  }).setView([52.68, -7.82], 15);

  normalLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 22,
    attribution: "OpenStreetMap"
  });

  satelliteLayer = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    maxZoom: 22,
    attribution: "Esri"
  });

  currentLayer = normalLayer;
  currentLayer.addTo(map);

  trackLine = L.polyline([], { weight: 4 }).addTo(map);
  coverageLine = L.polyline([], {
    weight: Number(document.getElementById("width").value) * 2,
    opacity: 0.35
  }).addTo(map);

  boundaryLine = L.polyline([], { weight: 3, dashArray: "6 6" }).addTo(map);

  loadSavedJob();
  updateStatus("ready");
}

function startGps() {
  clearWarn();

  if (!navigator.geolocation) {
    setWarn("This browser has no GPS/geolocation support.");
    return;
  }

  running = true;
  requestWakeLock();

  // Very plain GPS request. This is the basic method that normally works in Chrome/Android over HTTPS.
  watchId = navigator.geolocation.watchPosition(
    gpsSuccess,
    gpsError,
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 20000
    }
  );

  updateStatus("starting GPS...");
}

function stopGps() {
  running = false;
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  releaseWakeLock();
  saveJob();
  updateStatus("stopped");
}

function gpsSuccess(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = pos.coords.accuracy;
  const speed = pos.coords.speed;
  const time = Date.now();

  lastPosition = { lat, lon, acc, speed, time };

  if (acc > 50) {
    setWarn("Weak GPS accuracy: " + Math.round(acc) + " m. Move outside / away from buildings.");
  } else {
    clearWarn();
  }

  const point = [lat, lon];

  // Avoid adding duplicate noisy points when stationary.
  if (track.length === 0 || distanceMeters(track[track.length - 1], point) > 1.2) {
    track.push(point);
  }

  drawAll();

  if (!currentMarker) {
    currentMarker = L.marker(point).addTo(map);
    map.setView(point, 18);
  } else {
    currentMarker.setLatLng(point);
  }

  if (track.length < 5) {
    map.setView(point, 18);
  } else {
    map.panTo(point, { animate: false });
  }

  saveJob();
  updateStatus("GPS running");
}

function gpsError(err) {
  running = false;

  let msg = "GPS error.";
  if (err.code === 1) {
    msg = "Permission denied. Open using GitHub Pages / HTTPS, then allow Location for the site.";
  } else if (err.code === 2) {
    msg = "Position unavailable. Turn phone Location on and go outdoors.";
  } else if (err.code === 3) {
    msg = "GPS timeout. Try again outdoors and wait 20-30 seconds.";
  }

  setWarn(msg);
  updateStatus("GPS error");
}

function drawAll() {
  const width = Number(document.getElementById("width").value) || 10;

  trackLine.setLatLngs(track);
  coverageLine.setLatLngs(track);
  coverageLine.setStyle({ weight: Math.max(3, width * 2), opacity: 0.35 });

  boundaryLine.setLatLngs(boundary);

  if (boundaryPolygon) {
    map.removeLayer(boundaryPolygon);
    boundaryPolygon = null;
  }

  if (boundary.length >= 3) {
    boundaryPolygon = L.polygon(boundary, {
      weight: 2,
      fillOpacity: 0.08
    }).addTo(map);
  }
}

function markBoundary() {
  if (!lastPosition) {
    setWarn("Start GPS first, then press MARK BOUNDARY while driving/walking the field edge.");
    return;
  }

  boundary.push([lastPosition.lat, lastPosition.lon]);
  drawAll();
  saveJob();
  updateStatus("boundary point saved");
}

function finishBoundary() {
  if (boundary.length < 3) {
    setWarn("Need at least 3 boundary points.");
    return;
  }

  // Close polygon visually by repeating first point in line.
  boundaryLine.setLatLngs([...boundary, boundary[0]]);
  saveJob();
  updateStatus("field boundary finished");
}

function clearJob() {
  if (!confirm("Clear this job from phone storage?")) return;

  track = [];
  boundary = [];
  lastPosition = null;
  localStorage.removeItem(STORAGE_KEY);

  if (currentMarker) {
    map.removeLayer(currentMarker);
    currentMarker = null;
  }

  drawAll();
  updateStatus("cleared");
}

function resumeJob() {
  const ok = loadSavedJob();
  if (ok) {
    updateStatus("resumed saved job");
    if (track.length > 0) {
      map.fitBounds(trackLine.getBounds(), { padding: [30, 30] });
    }
  } else {
    setWarn("No saved job found.");
  }
}

function saveSettings() {
  drawAll();
  saveJob();
}

function saveJob() {
  const data = {
    track,
    boundary,
    width: document.getElementById("width").value,
    savedAt: new Date().toISOString()
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadSavedJob() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;

    const data = JSON.parse(raw);
    track = Array.isArray(data.track) ? data.track : [];
    boundary = Array.isArray(data.boundary) ? data.boundary : [];

    if (data.width) document.getElementById("width").value = data.width;

    drawAll();

    if (track.length > 0) {
      if (!currentMarker) currentMarker = L.marker(track[track.length - 1]).addTo(map);
      else currentMarker.setLatLng(track[track.length - 1]);
      setTimeout(() => map.fitBounds(trackLine.getBounds(), { padding: [30, 30] }), 400);
    }

    return true;
  } catch (e) {
    setWarn("Could not load saved job.");
    return false;
  }
}

function toggleMap() {
  map.removeLayer(currentLayer);
  currentLayer = currentLayer === normalLayer ? satelliteLayer : normalLayer;
  currentLayer.addTo(map);
}

function updateStatus(text) {
  const acc = lastPosition ? Math.round(lastPosition.acc) + " m" : "-";
  const saved = localStorage.getItem(STORAGE_KEY) ? "yes" : "no";
  document.getElementById("status").innerHTML =
    "Status: " + text + "<br>" +
    "Accuracy: " + acc + "<br>" +
    "Points: " + track.length + "<br>" +
    "Saved: " + saved;
}

function setWarn(msg) {
  document.getElementById("warn").textContent = msg;
}

function clearWarn() {
  document.getElementById("warn").textContent = "";
}

function distanceMeters(a, b) {
  const R = 6371000;
  const lat1 = a[0] * Math.PI / 180;
  const lat2 = b[0] * Math.PI / 180;
  const dLat = (b[0] - a[0]) * Math.PI / 180;
  const dLon = (b[1] - a[1]) * Math.PI / 180;

  const x = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1) * Math.cos(lat2) *
            Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
    }
  } catch (e) {
    // Not critical.
  }
}

function releaseWakeLock() {
  try {
    if (wakeLock) {
      wakeLock.release();
      wakeLock = null;
    }
  } catch (e) {}
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && running) {
    requestWakeLock();
  }
});

window.addEventListener("beforeunload", saveJob);

initMap();
</script>
</body>
</html>
