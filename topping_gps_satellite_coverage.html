<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Topping GPS Satellite Coverage</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body { margin:0; height:100%; font-family:system-ui, Arial, sans-serif; background:#101418; color:white; }
  #map { height:62vh; width:100%; background:#222; }
  .panel { padding:10px; background:#101418; }
  .card { background:#1b232b; border-radius:12px; padding:10px; margin:8px 0; }
  .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  label { display:block; font-size:13px; color:#c9d1d9; margin-top:6px; }
  input, button, select { width:100%; box-sizing:border-box; padding:10px; border-radius:9px; border:0; font-size:16px; margin-top:4px; }
  input, select { background:#eef2f6; color:#111; }
  button { background:#2f8cff; color:white; font-weight:800; }
  button.secondary { background:#56616c; }
  button.danger { background:#d64545; }
  .small { font-size:12px; color:#b7c0c9; }
  .big { font-size:22px; font-weight:850; }
  .ok { color:#7dff9b; }
  .warn { color:#ffd66b; }
  .bad { color:#ff8b8b; }
  .leaflet-control-attribution { font-size:10px; }
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div class="card">
    <div class="grid">
      <div>
        <label>Mower width m</label>
        <input id="width" type="number" value="1.85" min="0.5" step="0.05">
      </div>
      <div>
        <label>Field acres</label>
        <input id="fieldAcres" type="number" placeholder="17" min="0" step="0.1">
      </div>
      <div>
        <label>Map type</label>
        <select id="mapType" onchange="switchMap()">
          <option value="sat">Satellite</option>
          <option value="osm">Road map</option>
        </select>
      </div>
    </div>
    <div class="grid">
      <button onclick="start()">Start GPS</button>
      <button class="secondary" onclick="resetCoverage()">Reset</button>
      <button class="danger" onclick="stop()">Stop</button>
    </div>
  </div>

  <div class="card">
    <div class="grid">
      <div><div class="small">GPS</div><div id="status" class="big warn">Off</div></div>
      <div><div class="small">Accuracy</div><div id="acc" class="big">-- m</div></div>
      <div><div class="small">Speed</div><div id="speed" class="big">-- km/h</div></div>
      <div><div class="small">Area estimate</div><div id="area" class="big">0.00 ac</div></div>
      <div><div class="small">Distance</div><div id="dist" class="big">0 m</div></div>
      <div><div class="small">Progress</div><div id="progress" class="big">--</div></div>
    </div>
  </div>

  <div class="card small">
    Satellite view + green topper-width coverage. Area is still an estimate: distance × mower width. Overlaps are counted twice for now.
  </div>
</div>

<script>
let map, marker, circle;
let watchId = null;
let last = null;
let totalDist = 0;
let areaM2 = 0;
let track = [];
let coverageLayers = [];
let follow = true;

const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 22,
  attribution: "© OpenStreetMap"
});

const sat = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
  maxZoom: 19,
  attribution: "Tiles © Esri"
});

map = L.map("map", { zoomControl:true, layers:[sat] }).setView([52.5, -7.7], 15);
L.control.scale({imperial:false, metric:true}).addTo(map);

map.on("dragstart", () => follow=false);

function toRad(d){ return d*Math.PI/180; }

function haversine(a,b){
  const R=6371000;
  const dLat=toRad(b.lat-a.lat), dLon=toRad(b.lon-a.lon);
  const lat1=toRad(a.lat), lat2=toRad(b.lat);
  const x=Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function switchMap(){
  const type = document.getElementById("mapType").value;
  map.removeLayer(osm); map.removeLayer(sat);
  if(type === "sat") sat.addTo(map); else osm.addTo(map);
}

function drawCoverageSegment(a,b,width){
  const line = L.polyline([[a.lat,a.lon],[b.lat,b.lon]], {
    color:"#39ff6a",
    weight: Math.max(8, width * 6),
    opacity:0.58,
    lineCap:"butt",
    lineJoin:"round"
  }).addTo(map);
  coverageLayers.push(line);

  const centre = L.polyline([[a.lat,a.lon],[b.lat,b.lon]], {
    color:"#003b12",
    weight:2,
    opacity:0.8
  }).addTo(map);
  coverageLayers.push(centre);
}

function updateStats(acc, speedKph){
  const acres = areaM2 / 4046.8564224;
  const fieldAcres = parseFloat(document.getElementById("fieldAcres").value);
  document.getElementById("acc").textContent = Math.round(acc)+" m";
  document.getElementById("speed").textContent = speedKph == null ? "-- km/h" : speedKph.toFixed(1)+" km/h";
  document.getElementById("area").textContent = acres.toFixed(2)+" ac";
  document.getElementById("dist").textContent = Math.round(totalDist)+" m";
  document.getElementById("progress").textContent = fieldAcres ? Math.min(999,(acres/fieldAcres*100)).toFixed(0)+"%" : "--";
  document.getElementById("status").textContent = "On";
  document.getElementById("status").className = acc <= 5 ? "big ok" : (acc <= 12 ? "big warn" : "big bad");
}

function start(){
  if(!navigator.geolocation){
    alert("GPS not supported");
    return;
  }

  watchId = navigator.geolocation.watchPosition(pos=>{
    const p = {
      lat: pos.coords.latitude,
      lon: pos.coords.longitude,
      t: Date.now()
    };
    const acc = pos.coords.accuracy || 999;
    let speedKph = null;

    if(!marker){
      marker = L.marker([p.lat,p.lon]).addTo(map).bindPopup("Tractor / phone");
      circle = L.circle([p.lat,p.lon], {radius:acc, color:"#2f8cff", fillOpacity:0.08}).addTo(map);
      map.setView([p.lat,p.lon], 18);
    } else {
      marker.setLatLng([p.lat,p.lon]);
      circle.setLatLng([p.lat,p.lon]);
      circle.setRadius(acc);
    }

    if(last){
      const d = haversine(last,p);
      const dt = (p.t-last.t)/1000;
      if(d > 0.35 && d < 80 && dt > 0){
        const width = parseFloat(document.getElementById("width").value) || 1.85;
        totalDist += d;
        areaM2 += d * width;
        speedKph = (d/dt)*3.6;
        drawCoverageSegment(last,p,width);
        track.push(p);
      }
    } else {
      track.push(p);
    }

    last = p;
    updateStats(acc, speedKph);
    if(follow) map.setView([p.lat,p.lon], map.getZoom());
  }, err=>{
    document.getElementById("status").textContent = "GPS error";
    alert(err.message);
  }, {enableHighAccuracy:true, maximumAge:1000, timeout:10000});
}

function stop(){
  if(watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = null;
  document.getElementById("status").textContent = "Off";
  document.getElementById("status").className = "big warn";
}

function resetCoverage(){
  coverageLayers.forEach(l => map.removeLayer(l));
  coverageLayers = [];
  totalDist = 0;
  areaM2 = 0;
  track = [];
  last = null;
  follow = true;
  updateStats(0,null);
}
</script>
</body>
</html>
