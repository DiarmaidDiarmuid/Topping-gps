<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Fertiliser GPS Helper v4</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html, body { height:100%; margin:0; font-family: Arial, sans-serif; background:#111; }
  #map { height:100%; width:100%; }
  .panel {
    position: fixed; left: 8px; right: 8px; bottom: 8px; z-index: 1000;
    background: rgba(20,20,20,0.92); color: white; border-radius: 12px; padding: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,.45);
  }
  .row { display:flex; gap:8px; margin:6px 0; align-items:center; }
  button, input, select {
    font-size: 18px; border:0; border-radius:10px; padding:10px; min-height:44px;
  }
  button { flex:1; background:#eee; color:#111; font-weight:700; }
  button.good { background:#76d275; }
  button.warn { background:#ffd166; }
  button.bad { background:#ff6b6b; }
  button.dark { background:#444; color:white; }
  input { width: 90px; text-align:center; }
  #status { font-size:16px; line-height:1.25; }
  .topbox {
    position: fixed; top:8px; left:8px; right:8px; z-index:1000;
    background: rgba(20,20,20,0.86); color:white; border-radius:12px; padding:8px 10px;
    font-size:18px; font-weight:700; text-align:center;
  }
  .small { font-size:14px; opacity:.9; font-weight:400; }
</style>
</head>
<body>
<div id="map"></div>
<div class="topbox">
  <div id="guide">GPS not started</div>
  <div class="small" id="saved">Not saved yet</div>
</div>
<div class="panel">
  <div id="status">Ready. Set width, then Start.</div>
  <div class="row">
    <button class="good" id="startBtn">Start</button>
    <button class="warn" id="pauseBtn">Pause</button>
    <button class="dark" id="resumeBtn">Resume saved</button>
  </div>
  <div class="row">
    <button id="markBoundaryBtn">Mark boundary</button>
    <button id="finishBoundaryBtn">Finish boundary</button>
  </div>
  <div class="row">
    <button id="widthMinus">Width -</button>
    <input id="widthInput" type="number" value="12" min="0.5" step="0.5" />
    <button id="widthPlus">Width +</button>
  </div>
  <div class="row">
    <button id="centerBtn">Centre</button>
    <button class="bad" id="clearBtn">Clear job</button>
  </div>
</div>
<script>
(() => {
  const SAVE_KEY = "fert_gps_job_v4";
  const map = L.map('map', { zoomControl: false }).setView([52.68, -7.82], 16);

  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 22,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // Satellite tiles may depend on internet access. OSM stays as fallback.
  const esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 22,
    attribution: 'Tiles &copy; Esri'
  });
  L.control.layers({ "Map": osm, "Satellite": esriSat }, null, { position: 'topright' }).addTo(map);

  let watching = false;
  let watchId = null;
  let paused = false;
  let lastPos = null;
  let points = [];
  let boundaryPoints = [];
  let widthM = 12;
  let trackLine = L.polyline([], { weight: 4 }).addTo(map);
  let boundaryLine = L.polyline([], { weight: 3, dashArray: '8,8' }).addTo(map);
  let boundaryPoly = null;
  let gpsMarker = null;
  let accuracyCircle = null;
  let coverageLayer = L.layerGroup().addTo(map);
  let saveTimer = null;

  const $ = id => document.getElementById(id);
  const status = $('status');
  const guide = $('guide');
  const saved = $('saved');
  const widthInput = $('widthInput');

  function nowText() { return new Date().toLocaleTimeString(); }
  function setStatus(t) { status.textContent = t; }

  function toRad(d){ return d * Math.PI / 180; }
  function toDeg(r){ return r * 180 / Math.PI; }

  function distanceM(a,b){
    const R=6371000;
    const dLat=toRad(b.lat-a.lat), dLon=toRad(b.lng-a.lng);
    const la1=toRad(a.lat), la2=toRad(b.lat);
    const h=Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
    return 2*R*Math.asin(Math.sqrt(h));
  }

  function bearingRad(a,b){
    const la1=toRad(a.lat), la2=toRad(b.lat), dLon=toRad(b.lng-a.lng);
    const y=Math.sin(dLon)*Math.cos(la2);
    const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLon);
    return Math.atan2(y,x);
  }

  function offsetPoint(p, bearing, metres){
    const R=6371000;
    const d=metres/R;
    const lat1=toRad(p.lat), lon1=toRad(p.lng);
    const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(bearing));
    const lon2=lon1+Math.atan2(Math.sin(bearing)*Math.sin(d)*Math.cos(lat1), Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
    return [toDeg(lat2), toDeg(lon2)];
  }

  function drawCoverageSegment(a,b){
    if (distanceM(a,b) < 0.8) return;
    const brg = bearingRad(a,b);
    const left = brg - Math.PI/2;
    const right = brg + Math.PI/2;
    const half = widthM/2;
    const poly = [
      offsetPoint(a,left,half),
      offsetPoint(b,left,half),
      offsetPoint(b,right,half),
      offsetPoint(a,right,half)
    ];
    L.polygon(poly, { stroke:false, fillOpacity:0.28 }).addTo(coverageLayer);
  }

  function updateMarker(p){
    const ll = [p.lat, p.lng];
    if (!gpsMarker) gpsMarker = L.circleMarker(ll, { radius: 9, weight: 3, fillOpacity: 1 }).addTo(map);
    gpsMarker.setLatLng(ll);
    if (!accuracyCircle) accuracyCircle = L.circle(ll, { radius: p.acc || 0, weight: 1, fillOpacity: 0.08 }).addTo(map);
    accuracyCircle.setLatLng(ll).setRadius(p.acc || 0);
  }

  function onPosition(pos){
    const p = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      acc: Math.round(pos.coords.accuracy || 0),
      t: Date.now()
    };
    updateMarker(p);

    if (!lastPos) {
      lastPos = p;
      if (points.length === 0) { points.push(p); trackLine.addLatLng([p.lat,p.lng]); }
      map.setView([p.lat,p.lng], 18);
      guide.textContent = `Accuracy ${p.acc} m`;
      autosave();
      return;
    }

    const moved = distanceM(lastPos, p);
    if (!paused && moved > 1.0) {
      drawCoverageSegment(lastPos, p);
      points.push(p);
      trackLine.addLatLng([p.lat,p.lng]);
      const total = totalDistance(points);
      guide.textContent = `Tracking | Acc ${p.acc} m | ${total.toFixed(2)} km`;
      lastPos = p;
      autosave();
    } else {
      guide.textContent = paused ? `Paused | Acc ${p.acc} m` : `GPS live | Acc ${p.acc} m`;
      lastPos = p;
    }
  }

  function gpsHelpText(err){
    let reason = err && err.message ? err.message : 'Unknown GPS error';
    if (err && err.code === 1) reason = 'Permission denied. Allow Location for this browser.';
    if (err && err.code === 2) reason = 'Position unavailable. Go outside / wait for GPS lock.';
    if (err && err.code === 3) reason = 'GPS timeout. Go outside and press Start again.';

    const secure = window.isSecureContext || location.protocol === 'https:' || location.hostname === 'localhost';
    if (!secure) {
      return 'GPS blocked: open this from a secure HTTPS page, not as a plain downloaded file. Use GitHub Pages, or open through a local web server.';
    }
    return 'GPS error: ' + reason + ' If the older page still works, use v4 because it uses the same simple GPS call as the older version.';
  }

  function onError(err){
    guide.textContent = 'GPS error';
    setStatus(gpsHelpText(err));
  }

  function totalDistance(arr){
    let m=0;
    for(let i=1;i<arr.length;i++) m += distanceM(arr[i-1], arr[i]);
    return m/1000;
  }

  function startGPS(){
    widthM = parseFloat(widthInput.value) || 12;
    if (!navigator.geolocation) { setStatus('GPS not supported in this browser. Try Chrome/Edge on Android.'); return; }

    const secure = window.isSecureContext || location.protocol === 'https:' || location.hostname === 'localhost';
    if (!secure) {
      guide.textContent = 'GPS blocked';
      setStatus('GPS blocked because this page is not secure. Put the file on GitHub Pages / HTTPS, or run it from localhost. A file opened directly from Downloads often will not get GPS permission.');
      return;
    }

    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    paused = false;
    watching = true;
    setStatus('GPS starting. Using the same simple GPS method as the older working version.');

    // v4: use only watchPosition. Some Android browsers dislike a getCurrentPosition
    // request followed immediately by watchPosition and report POSITION_DENIED.
    watchId = navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy: true,
      maximumAge: 500,
      timeout: 15000
    });
  }

  function pauseGPS(){
    paused = !paused;
    setStatus(paused ? 'Paused. GPS marker still shows, but coverage is not painted.' : 'Resumed tracking.');
  }

  function markBoundary(){
    if (!lastPos) { setStatus('Start GPS first, then drive/walk the field boundary.'); return; }
    boundaryPoints.push(lastPos);
    boundaryLine.setLatLngs(boundaryPoints.map(p=>[p.lat,p.lng]));
    setStatus(`Boundary point added: ${boundaryPoints.length}`);
    autosave();
  }

  function finishBoundary(){
    if (boundaryPoints.length < 3) { setStatus('Need at least 3 boundary points.'); return; }
    if (boundaryPoly) map.removeLayer(boundaryPoly);
    boundaryPoly = L.polygon(boundaryPoints.map(p=>[p.lat,p.lng]), { fillOpacity:0.06, weight:2 }).addTo(map);
    map.fitBounds(boundaryPoly.getBounds());
    setStatus('Boundary finished and saved.');
    autosave();
  }

  function autosave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      const data = { points, boundaryPoints, widthM, lastPos, savedAt: Date.now() };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      saved.textContent = `Saved ${nowText()}`;
    }, 400);
  }

  function loadSaved(){
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) { setStatus('No saved job found.'); return; }
    try {
      const data = JSON.parse(raw);
      clearMapJob(false);
      points = data.points || [];
      boundaryPoints = data.boundaryPoints || [];
      widthM = data.widthM || 12;
      widthInput.value = widthM;
      lastPos = data.lastPos || null;
      trackLine.setLatLngs(points.map(p=>[p.lat,p.lng]));
      boundaryLine.setLatLngs(boundaryPoints.map(p=>[p.lat,p.lng]));
      if (boundaryPoints.length >= 3) {
        boundaryPoly = L.polygon(boundaryPoints.map(p=>[p.lat,p.lng]), { fillOpacity:0.06, weight:2 }).addTo(map);
      }
      for (let i=1;i<points.length;i++) drawCoverageSegment(points[i-1], points[i]);
      if (lastPos) updateMarker(lastPos);
      const bounds = trackLine.getBounds().isValid() ? trackLine.getBounds() : (boundaryPoly ? boundaryPoly.getBounds() : null);
      if (bounds) map.fitBounds(bounds.pad(0.2));
      setStatus(`Saved job loaded. Width ${widthM} m. Press Start to continue.`);
      saved.textContent = data.savedAt ? `Loaded save from ${new Date(data.savedAt).toLocaleString()}` : 'Loaded saved job';
    } catch(e) { setStatus('Could not load saved job.'); }
  }

  function clearMapJob(removeSave=true){
    points = [];
    boundaryPoints = [];
    lastPos = null;
    trackLine.setLatLngs([]);
    boundaryLine.setLatLngs([]);
    coverageLayer.clearLayers();
    if (boundaryPoly) { map.removeLayer(boundaryPoly); boundaryPoly = null; }
    if (gpsMarker) { map.removeLayer(gpsMarker); gpsMarker = null; }
    if (accuracyCircle) { map.removeLayer(accuracyCircle); accuracyCircle = null; }
    if (removeSave) localStorage.removeItem(SAVE_KEY);
    saved.textContent = removeSave ? 'Save cleared' : saved.textContent;
  }

  $('startBtn').onclick = startGPS;
  $('pauseBtn').onclick = pauseGPS;
  $('resumeBtn').onclick = loadSaved;
  $('markBoundaryBtn').onclick = markBoundary;
  $('finishBoundaryBtn').onclick = finishBoundary;
  $('centerBtn').onclick = () => { if (lastPos) map.setView([lastPos.lat,lastPos.lng], 18); };
  $('clearBtn').onclick = () => { if (confirm('Clear this job and saved data?')) { clearMapJob(true); setStatus('Job cleared.'); } };
  $('widthMinus').onclick = () => { widthInput.value = Math.max(0.5, (parseFloat(widthInput.value)||12)-0.5); widthM = parseFloat(widthInput.value); autosave(); };
  $('widthPlus').onclick = () => { widthInput.value = (parseFloat(widthInput.value)||12)+0.5; widthM = parseFloat(widthInput.value); autosave(); };
  widthInput.onchange = () => { widthM = parseFloat(widthInput.value)||12; autosave(); setStatus(`Width set to ${widthM} m.`); };

  // Try to keep the phone screen awake when supported.
  let wakeLock = null;
  async function requestWakeLock(){
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWakeLock(); });
  requestWakeLock();

  // Auto-offer saved job on launch.
  if (!window.isSecureContext && location.protocol !== 'https:' && location.hostname !== 'localhost') {
    setStatus('GPS will be blocked if opened as a downloaded file. Use HTTPS/GitHub Pages or localhost.');
    guide.textContent = 'Needs HTTPS for GPS';
  } else if (localStorage.getItem(SAVE_KEY)) {
    setStatus('Saved job found. Press Resume saved, or Start for a new/continued GPS session.');
  }
})();
</script>
</body>
</html>
